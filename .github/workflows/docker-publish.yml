name: Build and Publish Images

# Publishes two images to GHCR on every push to main:
#   :latest      unified production image (Go API + static frontend) — needs an
#                external PostgreSQL; used by docker-compose.prod.yml.
#   :dev         all-in-one dev/demo image (PostgreSQL + API + frontend in one
#                container). Run it standalone:
#                  docker run --rm -p 8080:8080 ghcr.io/<owner>/<repo>:dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Production image (:latest) ---
      - name: Metadata for production image
        id: meta-prod
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-prod.outputs.tags }}
          labels: ${{ steps.meta-prod.outputs.labels }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod

      # --- All-in-one dev/demo image (:dev) ---
      - name: Metadata for dev image
        id: meta-dev
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=dev-,format=short

      - name: Build and push all-in-one dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.aio
          push: true
          tags: ${{ steps.meta-dev.outputs.tags }}
          labels: ${{ steps.meta-dev.outputs.labels }}
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev
