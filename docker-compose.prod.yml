version: "3.8"

# Production stack: unified app image (Go API + static Next export) + PostgreSQL.
# Point SMTP/VAPID at real services and supply strong secrets via an .env file.

services:
  app:
    image: ghcr.io/naufalzaid17/timesheet-generator:latest
    container_name: timesheet_app_prod
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      GIN_MODE: release
      STATIC_FILES_PATH: ./static
      DATABASE_URL: "host=postgres user=${POSTGRES_USER:-timesheet} password=${POSTGRES_PASSWORD:-timesheet} dbname=${POSTGRES_DB:-timesheet} port=5432 sslmode=disable TimeZone=Asia/Jakarta"
      JWT_SECRET: "${JWT_SECRET:?set a strong JWT secret}"
      SCHEDULER_TZ: "Asia/Jakarta"
      SMTP_HOST: "${SMTP_HOST:-mailpit}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MAIL_FROM: "${MAIL_FROM:-Timesheet Portal <no-reply@timesheet.local>}"
      WEBAUTHN_RP_ID: "${WEBAUTHN_RP_ID:-localhost}"
      WEBAUTHN_RP_ORIGIN: "${WEBAUTHN_RP_ORIGIN:-http://localhost:8080}"
      # Fallback base for setup/reset email links. Behind a reverse proxy the
      # public origin (X-Forwarded-Proto/Host) is used automatically, so set this
      # to your public URL for direct (proxy-less) access.
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:8080}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@timesheet.local}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - timesheet-prod

  postgres:
    image: postgres:16-alpine
    container_name: timesheet_postgres_prod
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-timesheet}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-timesheet}"
      POSTGRES_DB: "${POSTGRES_DB:-timesheet}"
      TZ: Asia/Jakarta
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timesheet}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - timesheet-prod

volumes:
  postgres_data_prod:

networks:
  timesheet-prod:
    driver: bridge
